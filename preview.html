<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Slink Overlay Preview</title>
		<style>
			:root {
				color-scheme: dark;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
					Arial, sans-serif;
				background: radial-gradient(circle at top, #2e2730, #161316 55%);
				color: #f3f3f3;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 2rem 1rem 6rem;
			}

			.preview-shell {
				width: min(880px, 100%);
				display: grid;
				gap: 1rem;
			}

			.preview-header,
			.preview-card {
				background: rgba(255, 255, 255, 0.08);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 18px;
			}

			.preview-header {
				height: 64px;
			}

			.preview-content {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
				gap: 1rem;
			}

			.preview-card {
				height: 130px;
			}

			.preview-footer {
				height: 32px;
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.06);
			}
		</style>
	</head>
	<body>
		<main class="preview-shell" aria-label="Simple placeholder layout">
			<div class="preview-header"></div>
			<section class="preview-content">
				<div class="preview-card"></div>
				<div class="preview-card"></div>
				<div class="preview-card"></div>
				<div class="preview-card"></div>
			</section>
		    <div class="preview-footer"></div>
		</main>
		<script src="./preview-force-overlay.js"></script>
		<script src="./script.js"></script>
	</body>
</html>
